<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMOBA Client</title>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>
    <div id="info" style="position: absolute; top: 10px; left: 10px; color: #fff; font-family: monospace; z-index: 100;">Connecting...</div>
    <div id="controls" style="position: absolute; bottom: 20px; left: 20px; color: #ccc; font-family: monospace; font-size: 12px; z-index: 100; line-height: 1.6;">
        <div><strong>Controls:</strong></div>
        <div>WASD / Arrow Keys - Move</div>
        <div>Mouse Click - Set target</div>
        <div>Mouse Drag - Rotate camera</div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
